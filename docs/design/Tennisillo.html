// ── Helpers ──────────────────────────────────────────────────────────────────
function playerById(id) { return window.PLAYERS.find(p => p.id === id) || {}; }

function Avatar({ player, size = 36 }) {
  const hue = player?.hue ?? '85';
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', flexShrink: 0,
      background: `linear-gradient(135deg, oklch(0.72 0.18 ${hue}), oklch(0.55 0.22 ${hue}))`,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontSize: size * 0.36, fontWeight: 700, color:'rgba(0,0,0,0.75)',
      border:'1.5px solid rgba(255,255,255,0.25)',
      boxShadow:`0 0 14px oklch(0.65 0.18 ${hue} / 0.35)`,
      letterSpacing:'-0.02em',
    }}>
      {player?.initials ?? '?'}
    </div>
  );
}

function StatusBadge({ status }) {
  const map = {
    confirmed: { label:'Confermata', bg:'rgba(185,255,90,0.18)',  border:'rgba(185,255,90,0.4)',  color:'#c8ff78' },
    pending:   { label:'In attesa',  bg:'rgba(242,211,94,0.18)',  border:'rgba(242,211,94,0.4)',  color:'#f5d96a' },
    completed: { label:'Completata', bg:'rgba(121,167,216,0.18)', border:'rgba(121,167,216,0.4)', color:'#9abfdd' },
    cancelled: { label:'Annullata',  bg:'rgba(255,255,255,0.08)', border:'rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.5)' },
    disputed:  { label:'Contestata', bg:'rgba(233,109,109,0.18)', border:'rgba(233,109,109,0.4)', color:'#f09090' },
    win:       { label:'Vittoria',   bg:'rgba(185,255,90,0.18)',  border:'rgba(185,255,90,0.4)',  color:'#c8ff78' },
    loss:      { label:'Sconfitta',  bg:'rgba(233,109,109,0.18)', border:'rgba(233,109,109,0.4)', color:'#f09090' },
    training:  { label:'Allenamento',bg:'rgba(121,167,216,0.18)',border:'rgba(121,167,216,0.4)', color:'#9abfdd' },
  };
  const s = map[status] ?? map.pending;
  return (
    <span style={{
      padding:'3px 10px', borderRadius:999, fontSize:11, fontWeight:600,
      background:s.bg, border:`1px solid ${s.border}`, color:s.color, whiteSpace:'nowrap',
    }}>{s.label}</span>
  );
}

function BtnPrimary({ children, onClick, small }) {
  const [hover, setHover] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{
        background: hover
          ? 'linear-gradient(135deg,#d8ff88,#a0ef5a)'
          : 'linear-gradient(135deg,#c8ff6a,#8ee044)',
        color:'#0a1a0e', fontWeight:700, border:'none', cursor:'pointer',
        padding: small ? '7px 16px' : '10px 22px',
        borderRadius:14, fontSize: small ? 12 : 14,
        boxShadow:`0 8px 24px rgba(185,255,90,${hover?0.4:0.25})`,
        transform: hover ? 'translateY(-1px)' : 'none',
        transition:'all 0.18s ease', display:'flex', alignItems:'center', gap:6,
      }}>{children}</button>
  );
}

function BtnSecondary({ children, onClick, small, danger }) {
  const [hover, setHover] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{
        background: hover
          ? (danger ? 'rgba(233,109,109,0.22)' : 'rgba(255,255,255,0.15)')

function GlassCard({ children, style, onClick, hover: hoverClass }) {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        background: hov && hoverClass
          ? 'linear-gradient(135deg,rgba(255,255,255,0.15),rgba(255,255,255,0.07))'
          : 'linear-gradient(135deg,rgba(255,255,255,0.12),rgba(255,255,255,0.05))',
        border:'1px solid rgba(255,255,255,0.14)',
        borderRadius:20, backdropFilter:'blur(26px) saturate(140%)',
        boxShadow: hov && hoverClass
          ? '0 20px 50px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.2)'
          : '0 14px 40px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.18)',
        transform: hov && hoverClass ? 'translateY(-2px)' : 'none',
        transition:'all 0.22s ease', cursor: onClick ? 'pointer' : 'default',
        ...style,
      }}>{children}</div>
  );
}

function GlassInput({ label, value, onChange, type='text', placeholder }) {
  const [focus, setFocus] = useState(false);
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
      {label && <label style={{ fontSize:12, color:'rgba(255,255,255,0.55)', fontWeight:500 }}>{label}</label>}
      <input
        type={type} value={value} onChange={e=>onChange(e.target.value)}
        placeholder={placeholder}
        onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
        style={{
          background: focus ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.07)',
          border:`1px solid ${focus ? 'rgba(185,255,90,0.5)' : 'rgba(255,255,255,0.14)'}`,
          borderRadius:12, padding:'10px 14px', color:'rgba(255,255,255,0.9)',
          fontSize:14, outline:'none', width:'100%', boxSizing:'border-box',
          backdropFilter:'blur(12px)',
          boxShadow: focus ? '0 0 0 3px rgba(185,255,90,0.12)' : 'none',
          transition:'all 0.18s ease',
        }}
      />
    </div>
  );
}

function GlassSelect({ label, value, onChange, options }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
      {label && <label style={{ fontSize:12, color:'rgba(255,255,255,0.55)', fontWeight:500 }}>{label}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{
          background:'rgba(12,28,36,0.85)', border:'1px solid rgba(255,255,255,0.14)',
          borderRadius:12, padding:'10px 14px', color:'rgba(255,255,255,0.9)',
          fontSize:14, outline:'none', width:'100%', backdropFilter:'blur(12px)',
          cursor:'pointer',
        }}>
        {options.map(o => <option key={o} value={o}>{o}</option>)}

}

function SegmentedControl({ options, value, onChange }) {
  return (
    <div style={{
      display:'inline-flex', background:'rgba(255,255,255,0.07)',
      border:'1px solid rgba(255,255,255,0.12)', borderRadius:12,
      padding:3, gap:2,
    }}>
      {options.map(opt => (
        <button key={opt} onClick={()=>onChange(opt)} style={{
          padding:'6px 14px', borderRadius:10, border:'none', cursor:'pointer',
          fontSize:13, fontWeight:600, transition:'all 0.18s ease',
          background: value===opt ? 'rgba(185,255,90,0.2)' : 'transparent',
          color: value===opt ? '#c8ff78' : 'rgba(255,255,255,0.5)',
          boxShadow: value===opt ? 'inset 0 1px 0 rgba(255,255,255,0.15)' : 'none',
        }}>{opt}</button>

// ── KPI Card ─────────────────────────────────────────────────────────────────
function KpiCard({ icon, label, value, delta, positive=true }) {

// ── Mini Line Chart ───────────────────────────────────────────────────────────
function MiniLineChart({ data, dates, width=300, height=80 }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data) - 50;
  const max = Math.max(...data) + 30;
  const pts = data.map((v,i) => {
    const x = (i / (data.length-1)) * width;
    const y = height - ((v - min) / (max - min)) * height;
    return `${x},${y}`;
  });
  const pathD = `M ${pts.join(' L ')}`;
  const areaD = `M ${pts[0]} L ${pts.join(' L ')} L ${width},${height} L 0,${height} Z`;
  return (
    <svg width={width} height={height} style={{ overflow:'visible' }}>
      <defs>
        <linearGradient id="lgArea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#B9FF5A" stopOpacity="0.35" />
          <stop offset="100%" stopColor="#B9FF5A" stopOpacity="0.02" />
        </linearGradient>
      </defs>
      <path d={areaD} fill="url(#lgArea)" />
      <path d={pathD} fill="none" stroke="#B9FF5A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((v,i) => {
        const [x,y] = pts[i].split(',').map(Number);
        return <circle key={i} cx={x} cy={y} r={i===data.length-1?4:2.5}
          fill={i===data.length-1?'#B9FF5A':'rgba(185,255,90,0.7)'}
          stroke="rgba(185,255,90,0.5)" strokeWidth="1.5" />;
      })}
    </svg>
  );
}

// ── Ranking Row ───────────────────────────────────────────────────────────────
function RankingRow({ player, isCurrentPlayer, onClick }) {
  const [hov, setHov] = useState(false);
  const isTop3 = player.ranking <= 3;
  const medal = ['🥇','🥈','🥉'];
  return (
    <div onClick={()=>onClick(player)}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        display:'grid', gridTemplateColumns:'44px 1fr 90px 80px 80px 70px',
        alignItems:'center', padding:'10px 14px', borderRadius:14, cursor:'pointer',
        background: isCurrentPlayer
          ? 'rgba(185,255,90,0.10)'
          : hov ? 'rgba(255,255,255,0.06)' : 'transparent',
        border: isCurrentPlayer ? '1px solid rgba(185,255,90,0.3)' : '1px solid transparent',
        boxShadow: isCurrentPlayer ? '0 0 20px rgba(185,255,90,0.1)' : 'none',
        transition:'all 0.15s ease', marginBottom:2,
      }}>
      <div style={{ fontSize:14, fontWeight:700, color: isTop3 ? undefined : 'rgba(255,255,255,0.7)' }}>
        {isTop3 ? medal[player.ranking-1] : player.ranking}
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <Avatar player={player} size={30} />
        <div>
          <div style={{ fontSize:13, fontWeight:600, color: isCurrentPlayer ? '#c8ff78' : 'rgba(255,255,255,0.9)' }}>{player.name}</div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)' }}>Livello {player.level}</div>
        </div>
      </div>
      <div style={{ fontSize:14, fontWeight:700, color:'rgba(255,255,255,0.9)', textAlign:'right' }}>{player.points.toLocaleString()}</div>
      <div style={{ textAlign:'right' }}>
        {player.variation === 0
          ? <span style={{ color:'rgba(255,255,255,0.35)', fontSize:12 }}>—</span>
          : <span style={{ color: player.variation > 0 ? '#b0ef60' : '#f09090', fontSize:12, fontWeight:700 }}>
              {player.variation > 0 ? `▲ ${player.variation}` : `▼ ${Math.abs(player.variation)}`}
            </span>
        }
      </div>
      <div style={{ fontSize:13, color:'rgba(255,255,255,0.7)', textAlign:'right' }}>{player.winRate}%</div>
      <div style={{ fontSize:13, color:'rgba(255,255,255,0.55)', textAlign:'right' }}>{player.matches}</div>
    </div>
  );
}

function ActivityItem({ item }) {

// ── Challenge Card ────────────────────────────────────────────────────────────
function ChallengeCard({ challenge, onAccept, onReject }) {
  const from = playerById(challenge.fromId);
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:12, padding:'12px',
      background:'rgba(255,255,255,0.06)', borderRadius:14, marginBottom:8,

      }}>✕</button>
      <button onClick={onAccept} style={{

      }}>✓</button>

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({ toasts, remove }) {
  const colors = {
    success: { bg:'rgba(185,255,90,0.15)', border:'rgba(185,255,90,0.4)', icon:'✓', c:'#c8ff78' },
    info:    { bg:'rgba(121,167,216,0.15)',border:'rgba(121,167,216,0.4)',icon:'ℹ', c:'#9abfdd' },
    warning: { bg:'rgba(242,211,94,0.15)', border:'rgba(242,211,94,0.4)', icon:'!', c:'#f5d96a' },
    danger:  { bg:'rgba(233,109,109,0.15)',border:'rgba(233,109,109,0.4)',icon:'✕', c:'#f09090' },
  };
  return (
    <div style={{ position:'fixed', top:20, right:20, zIndex:9999, display:'flex', flexDirection:'column', gap:8, pointerEvents:'none' }}>
      {toasts.map(t => {
        const s = colors[t.tone] ?? colors.info;
        return (
          <div key={t.id} style={{
            background:s.bg, border:`1px solid ${s.border}`, borderRadius:14,
            padding:'12px 16px', backdropFilter:'blur(24px)', pointerEvents:'all',
            display:'flex', alignItems:'center', gap:10, minWidth:260,
            boxShadow:'0 10px 30px rgba(0,0,0,0.3)', animation:'slideIn 0.25s ease',
          }}>
            <span style={{ color:s.c, fontWeight:700, fontSize:14 }}>{s.icon}</span>
            <span style={{ fontSize:13, color:'rgba(255,255,255,0.9)', flex:1 }}>{t.message}</span>
            <button onClick={()=>remove(t.id)} style={{ background:'none', border:'none', color:'rgba(255,255,255,0.4)', cursor:'pointer', fontSize:14, padding:0 }}>✕</button>
          </div>
        );
      })}
    </div>
  );
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({ title, children, onClose }) {
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', backdropFilter:'blur(10px)',
      zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:24,
    }} onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div style={{
        background:'linear-gradient(135deg,rgba(255,255,255,0.16),rgba(255,255,255,0.08))',
        border:'1px solid rgba(255,255,255,0.2)', borderRadius:24,
        backdropFilter:'blur(36px) saturate(150%)', boxShadow:'0 32px 80px rgba(0,0,0,0.5)',
        padding:'28px 32px', width:'100%', maxWidth:480,
        animation:'modalIn 0.22s ease',
      }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <h3 style={{ margin:0, fontSize:18, fontWeight:700, color:'rgba(255,255,255,0.95)' }}>{title}</h3>
          <button onClick={onClose} style={{
            width:30, height:30, borderRadius:10, border:'1px solid rgba(255,255,255,0.15)',
            background:'rgba(255,255,255,0.08)', color:'rgba(255,255,255,0.6)',
            cursor:'pointer', fontSize:14,
          }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

Object.assign(window, {
  Avatar, StatusBadge, BtnPrimary, BtnSecondary,
  GlassCard, GlassInput, GlassSelect, SegmentedControl,
  KpiCard, MatchRow, MiniLineChart, RankingRow,
  ActivityItem, ChallengeCard, Toast, Modal,
  playerById,
});

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">

      </div>

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ── Calendario ────────────────────────────────────────────────────────────────
function ScreenCalendario() {
  const [view, setView] = useState('Mese');
  const days = ['LUN','MAR','MER','GIO','VEN','SAB','DOM'];
  // May 2026 starts on Friday (index 4)
  const totalDays = 31; const startOffset = 4;
  const cells = Array.from({ length: startOffset + totalDays }, (_, i) =>
    i < startOffset ? null : i - startOffset + 1
  );
  while (cells.length % 7 !== 0) cells.push(null);
  const eventColors = { confirmed:'#B9FF5A', pending:'#F2D35E', training:'#79A7D8', sparring:'#79A7D8' };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <h1 style={{ margin:0, fontSize:28, fontWeight:800, color:'rgba(255,255,255,0.97)', letterSpacing:'-0.02em' }}>Calendario</h1>
          <p style={{ margin:'4px 0 0', fontSize:14, color:'rgba(255,255,255,0.45)' }}>Maggio 2026</p>
        </div>
        <div style={{ display:'flex', gap:10, alignItems:'center' }}>
          <window.SegmentedControl options={['Mese','Settimana','Oggi']} value={view} onChange={setView} />
          <button style={{
            width:36, height:36, borderRadius:10, background:'rgba(255,255,255,0.09)',
            border:'1px solid rgba(255,255,255,0.14)', color:'rgba(255,255,255,0.7)',
            cursor:'pointer', fontSize:14,
          }}>‹</button>
          <button style={{
            width:36, height:36, borderRadius:10, background:'rgba(255,255,255,0.09)',
            border:'1px solid rgba(255,255,255,0.14)', color:'rgba(255,255,255,0.7)',
            cursor:'pointer', fontSize:14,
          }}>›</button>
        </div>
      </div>
      <window.GlassCard style={{ padding:'20px 22px' }}>
        {/* Day headers */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:8, marginBottom:8 }}>
          {days.map(d => (
            <div key={d} style={{ textAlign:'center', fontSize:11, fontWeight:700,
              color:'rgba(255,255,255,0.35)', letterSpacing:'0.06em', padding:'4px 0' }}>{d}</div>
          ))}
        </div>
        {/* Calendar grid */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:8 }}>
          {cells.map((day, i) => {
            const evs = day ? window.CALENDAR_EVENTS.filter(e => e.date === day) : [];
            const isToday = day === 24;
            return (
              <div key={i} style={{
                minHeight:80, borderRadius:12, padding:'8px',
                background: isToday ? 'rgba(185,255,90,0.12)' : 'rgba(255,255,255,0.04)',
                border: isToday ? '1px solid rgba(185,255,90,0.35)' : '1px solid rgba(255,255,255,0.07)',
                cursor: day ? 'pointer' : 'default',
              }}>
                {day && (
                  <>
                    <div style={{
                      fontSize:13, fontWeight: isToday ? 800 : 600,
                      color: isToday ? '#c8ff78' : 'rgba(255,255,255,0.7)',
                      marginBottom:4,
                    }}>{day}</div>
                    {evs.map((ev, j) => (
                      <div key={j} style={{
                        fontSize:10, fontWeight:600, padding:'2px 6px', borderRadius:6,
                        background: `${eventColors[ev.status] ?? '#B9FF5A'}22`,
                        border: `1px solid ${eventColors[ev.status] ?? '#B9FF5A'}55`,
                        color: eventColors[ev.status] ?? '#c8ff78',
                        marginBottom:2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                      }}>{ev.title}</div>
                    ))}
                  </>
                )}
              </div>
            );
          })}
        </div>
        {/* Legend */}
        <div style={{ display:'flex', gap:16, marginTop:16 }}>
          {[
            { color:'#B9FF5A', label:'Partita' },
            { color:'#F2D35E', label:'In attesa' },
            { color:'#79A7D8', label:'Allenamento' },
          ].map(l => (
            <div key={l.label} style={{ display:'flex', alignItems:'center', gap:6 }}>
              <div style={{ width:8, height:8, borderRadius:2, background:l.color }} />
              <span style={{ fontSize:11, color:'rgba(255,255,255,0.45)' }}>{l.label}</span>
            </div>
          ))}
        </div>
      </window.GlassCard>
    </div>
  );
}

// ── SFIDE ─────────────────────────────────────────────────────────────────────
function ScreenSfide({ addToast }) {
  const [tab, setTab] = useState('Ricevute');
  const [sfideRic, setSfideRic] = useState(SFIDE_RICEVUTE);
  const [sfideInv, setSfideInv] = useState(SFIDE_INVIATE);
  const [sparring, setSparring] = useState(SPARRING_HISTORY);

  const accept = (id) => { setSfideRic(s => s.filter(x => x.id !== id)); addToast({ message:'Sfida accettata! Partita programmata.', tone:'success' }); };
  const reject = (id) => { setSfideRic(s => s.filter(x => x.id !== id)); addToast({ message:'Sfida rifiutata.', tone:'info' }); };
  const cancel = (id) => { setSfideInv(s => s.filter(x => x.id !== id)); addToast({ message:'Sfida annullata.', tone:'info' }); };

  const typeLabel = { match:'Partita', sparring:'Sparring' };
  const typeIcon  = { match:'🎾', sparring:'⚡' };
  const stsColor  = { confirmed:'rgba(185,255,90,0.18)', pending:'rgba(242,211,94,0.12)', rejected:'rgba(233,109,109,0.12)' };
  const stsBorder = { confirmed:'rgba(185,255,90,0.35)', pending:'rgba(242,211,94,0.3)',  rejected:'rgba(233,109,109,0.3)' };
  const stsText   = { confirmed:'Confermata', pending:'In attesa', rejected:'Rifiutata' };
  const stsColor2 = { confirmed:'#c8ff78', pending:'#f5d96a', rejected:'#f09090' };

  const pendingCount = sfideRic.filter(s => s.status === 'pending').length;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <h1 style={{ margin:0, fontSize:28, fontWeight:800, color:'rgba(255,255,255,0.97)', letterSpacing:'-0.02em' }}>Sfide</h1>

        {pendingCount > 0 && (
          <div style={{
            background:'rgba(185,255,90,0.18)', border:'1px solid rgba(185,255,90,0.35)',
            borderRadius:14, padding:'8px 16px', display:'flex', alignItems:'center', gap:8,
          }}>
            <span style={{ fontSize:18 }}>⚡</span>
            <div>
              <div style={{ fontSize:14, fontWeight:800, color:'#c8ff78' }}>{pendingCount} sfide</div>
              <div style={{ fontSize:11, color:'rgba(185,255,90,0.6)' }}>in attesa di risposta</div>
            </div>
          </div>
        )}
      </div>

      <SegmentedControl options={['Ricevute','Inviate','Sparring']} value={tab} onChange={setTab} />

      {/* Ricevute */}
      {tab === 'Ricevute' && (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {sfideRic.length === 0 ? (
            <GlassCard style={{ padding:'40px', textAlign:'center' }}>
              <div style={{ fontSize:40, marginBottom:10 }}>🎾</div>
              <div style={{ fontSize:16, fontWeight:700, color:'rgba(255,255,255,0.6)' }}>Nessuna sfida ricevuta</div>
            </GlassCard>
          ) : sfideRic.map(s => {
            const from = playerById(s.fromId);
            return (
              <GlassCard key={s.id} style={{ padding:'18px 22px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                  <div style={{
                    width:40, height:40, borderRadius:12, flexShrink:0,
                    background: s.type === 'sparring' ? 'rgba(242,211,94,0.18)' : 'rgba(185,255,90,0.18)',
                    border: `1px solid ${s.type === 'sparring' ? 'rgba(242,211,94,0.4)' : 'rgba(185,255,90,0.4)'}`,
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:20,
                  }}>{typeIcon[s.type]}</div>
                  <Avatar player={from} size={40} />
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{ fontSize:15, fontWeight:700, color:'rgba(255,255,255,0.95)' }}>{from.name}</span>
                      <span style={{
                        background: s.type==='sparring' ? 'rgba(242,211,94,0.15)' : 'rgba(185,255,90,0.15)',
                        border:`1px solid ${s.type==='sparring' ? 'rgba(242,211,94,0.35)' : 'rgba(185,255,90,0.35)'}`,
                        borderRadius:999, padding:'1px 8px', fontSize:10, fontWeight:700,
                        color: s.type==='sparring' ? '#f5d96a' : '#c8ff78',
                      }}>{typeLabel[s.type]}</span>
                    </div>
                    <div style={{ fontSize:12, color:'rgba(255,255,255,0.5)', marginTop:3 }}>
                      📅 {s.proposedDate} alle {s.time} · 📍 {s.venue}

                  </div>
                  <div style={{ display:'flex', gap:8 }}>
                    <BtnSecondary small danger onClick={() => reject(s.id)}>Rifiuta</BtnSecondary>
                    <BtnPrimary small onClick={() => accept(s.id)}>Accetta</BtnPrimary>
                  </div>
                </div>
              </GlassCard>
            );
          })}
        </div>
      )}

      {/* Inviate */}
      {tab === 'Inviate' && (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {sfideInv.map(s => {
            const to = playerById(s.toId);
            return (
              <GlassCard key={s.id} style={{ padding:'18px 22px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                  <Avatar player={to} size={42} />
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{ fontSize:15, fontWeight:700, color:'rgba(255,255,255,0.95)' }}>{to.name}</span>
                      <span style={{
                        background: s.type==='sparring' ? 'rgba(242,211,94,0.15)' : 'rgba(185,255,90,0.15)',
                        border:`1px solid ${s.type==='sparring' ? 'rgba(242,211,94,0.35)' : 'rgba(185,255,90,0.35)'}`,
                        borderRadius:999, padding:'1px 8px', fontSize:10, fontWeight:700,
                        color: s.type==='sparring' ? '#f5d96a' : '#c8ff78',
                      }}>{typeLabel[s.type]}</span>
                    </div>
                    <div style={{ fontSize:12, color:'rgba(255,255,255,0.5)', marginTop:3 }}>
                      📅 {s.proposedDate} · {s.time} · 📍 {s.venue}
                    </div>
                    <div style={{ fontSize:11, color:'rgba(255,255,255,0.3)', marginTop:1 }}>Inviata {s.createdAt}</div>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <div style={{
                      background: stsColor[s.status], border:`1px solid ${stsBorder[s.status]}`,
                      borderRadius:999, padding:'4px 12px', fontSize:12, fontWeight:700,
                      color: stsColor2[s.status],
                    }}>{stsText[s.status]}</div>
                    {s.status === 'pending' && (
                      <button onClick={() => cancel(s.id)} style={{
                        width:28, height:28, borderRadius:8, border:'1px solid rgba(255,255,255,0.15)',
                        background:'rgba(255,255,255,0.07)', color:'rgba(255,255,255,0.5)',
                        cursor:'pointer', fontSize:12,
                      }}>✕</button>
                    )}
                  </div>
                </div>
              </GlassCard>
            );
          })}
          {/* Pending slots indicator */}
          <GlassCard style={{ padding:'14px 18px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div style={{ fontSize:13, color:'rgba(255,255,255,0.55)' }}>Sfide aperte</div>
              <div style={{ display:'flex', gap:6 }}>
                {[1,2,3].map(i => (
                  <div key={i} style={{
                    width:28, height:28, borderRadius:8,
                    background: i <= sfideInv.filter(s=>s.status==='pending').length

                    border: i <= sfideInv.filter(s=>s.status==='pending').length
                      ? '1px solid rgba(185,255,90,0.35)' : '1px solid rgba(255,255,255,0.1)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:13, color: i <= sfideInv.filter(s=>s.status==='pending').length ? '#c8ff78' : 'rgba(255,255,255,0.2)',
                  }}>{i}</div>
                ))}
              </div>
              <div style={{ fontSize:12, color:'rgba(255,255,255,0.35)' }}>max 3 aperte</div>
            </div>
          </GlassCard>
        </div>
      )}

      {/* Sparring */}
      {tab === 'Sparring' && (
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {/* Weekly cap */}
          <GlassCard style={{ padding:'16px 20px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:16 }}>
              <div style={{ fontSize:28 }}>⚡</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.85)', marginBottom:4 }}>
                  Sparring questa settimana
                </div>
                <div style={{ height:5, borderRadius:999, background:'rgba(255,255,255,0.1)' }}>
                  <div style={{
                    height:'100%', width:'50%', borderRadius:999,
                    background:'linear-gradient(90deg,#f5d96a,#f2a35a)',
                  }} />
                </div>
                <div style={{ fontSize:12, color:'rgba(255,255,255,0.4)', marginTop:4 }}>1 / 2 sessioni utilizzate</div>
              </div>
              <BtnPrimary small onClick={() => addToast({ message:'Richiesta sparring inviata!', tone:'success' })}>
                + Nuovo sparring
              </BtnPrimary>
            </div>
          </GlassCard>
          {/* History */}
          <GlassCard style={{ padding:'20px 22px' }}>
            <SectionTitle>Storico Sparring</SectionTitle>
            {SPARRING_HISTORY.map(s => {
              const opp = playerById(s.opponentId);
              return (
                <div key={s.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0',
                  borderBottom:'1px solid rgba(255,255,255,0.06)' }}>

                    <div style={{ fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.9)' }}>{opp.name}</div>

                  <div style={{ fontSize:13, fontWeight:700, color:'#f5d96a' }}>+{s.points} pt</div>
                  <span style={{
                    background:'rgba(121,167,216,0.15)', border:'1px solid rgba(121,167,216,0.35)',
                    borderRadius:999, padding:'2px 10px', fontSize:11, color:'#9abfdd', fontWeight:600,
                  }}>Sparring</span>
                </div>
              );
            })}
          </GlassCard>
        </div>
      )}
    </div>
  );
}

                <div style={{ fontSize:12, textAlign:'right', color: pb.mRisultato > 0 ? '#c8ff78' : 'rgba(255,255,255,0.5)' }}>

              {Object.entries(H2H).map(([pid, h]) => {
                const p = playerById(pid);
                const total = h.wins + h.losses;
                const winPct = total > 0 ? Math.round((h.wins/total)*100) : 0;
                return (
                  <div key={pid} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px',
                    background:'rgba(255,255,255,0.05)', borderRadius:12, border:'1px solid rgba(255,255,255,0.08)' }}>

                    <div style={{ flex:1, minWidth:0 }}>

                      <div style={{ height:3, borderRadius:999, background:'rgba(255,255,255,0.1)', marginTop:4 }}>

        </div>

      {/* BADGE TAB */}
      {tab === 'Badge' && (
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:12 }}>

              <GlassCard key={b.id} style={{
                padding:'16px 18px',
                opacity: b.earned ? 1 : 0.6,
                border: b.earned ? '1px solid rgba(185,255,90,0.25)' : '1px solid rgba(255,255,255,0.08)',

                  <div style={{
                    width:44, height:44, borderRadius:14, flexShrink:0,
                    background: b.earned ? 'rgba(185,255,90,0.15)' : 'rgba(255,255,255,0.06)',
                    border: b.earned ? '1px solid rgba(185,255,90,0.35)' : '1px solid rgba(255,255,255,0.1)',
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:22,
                    filter: b.earned ? 'none' : 'grayscale(0.8)',
                  }}>{b.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}>

                      {b.name}
                    </div>
                    <div style={{ fontSize:11, color:'rgba(255,255,255,0.38)', marginTop:1, lineHeight:1.4 }}>{b.desc}</div>
                    {b.earned && <div style={{ fontSize:10, color:'#c8ff78', marginTop:3, fontWeight:600 }}>✓ Conquistato {b.date}</div>}

          </div>
        </div>
      )}
    </div>
  );
}

// ── MESSAGGI / BACHECA ────────────────────────────────────────────────────────
function ScreenMessaggi({ addToast }) {
  const [liked, setLiked] = useState({});
  const [newMsg, setNewMsg] = useState('');

  const typeIcon = {
    match_result:'🎾', ranking:'🏆', badge:'🏅', sparring:'⚡',
    admin:'📢', challenge:'⚔️',
  };
  const typeBg = {
    match_result:'rgba(185,255,90,0.08)', ranking:'rgba(242,211,94,0.08)',
    badge:'rgba(185,255,90,0.12)', sparring:'rgba(121,167,216,0.08)',
    admin:'rgba(255,255,255,0.10)', challenge:'rgba(233,109,109,0.08)',
  };

  const toggleLike = (id) => setLiked(l => ({ ...l, [id]: !l[id] }));

  const post = () => {
    if (!newMsg.trim()) return;
    addToast({ message:'Messaggio pubblicato in bacheca!', tone:'success' });
    setNewMsg('');
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div>
        <h1 style={{ margin:0, fontSize:28, fontWeight:800, color:'rgba(255,255,255,0.97)', letterSpacing:'-0.02em' }}>Bacheca Lega</h1>
        <p style={{ margin:'4px 0 0', fontSize:14, color:'rgba(255,255,255,0.45)' }}>Attività e comunicazioni della lega</p>
      </div>

      {/* Compose */}
      <GlassCard style={{ padding:'16px 20px' }}>
        <div style={{ display:'flex', gap:10, alignItems:'center' }}>
          <Avatar player={CURRENT_PLAYER} size={36} />
          <div style={{ flex:1 }}>
            <input
              value={newMsg}
              onChange={e => setNewMsg(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && post()}
              placeholder="Scrivi un messaggio alla lega…"
              style={{
                width:'100%', background:'rgba(255,255,255,0.07)',
                border:'1px solid rgba(255,255,255,0.12)', borderRadius:12,
                padding:'10px 14px', color:'rgba(255,255,255,0.88)', fontSize:13,
                outline:'none',
              }}
            />
          </div>
          <BtnPrimary small onClick={post}>Pubblica</BtnPrimary>
        </div>
      </GlassCard>

      {/* Feed */}
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        {BACHECA.map(item => {
          const p = item.playerId ? playerById(item.playerId) : null;
          const isLiked = liked[item.id];
          return (
            <GlassCard key={item.id} style={{ padding:'16px 20px', background: typeBg[item.type] ?? 'rgba(255,255,255,0.07)' }}>
              <div style={{ display:'flex', gap:12 }}>
                {/* Icon or avatar */}
                {p ? (
                  <Avatar player={p} size={38} />
                ) : (
                  <div style={{
                    width:38, height:38, borderRadius:12, flexShrink:0,
                    background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.15)',
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:18,
                  }}>{typeIcon[item.type]}</div>
                )}
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, color:'rgba(255,255,255,0.88)', lineHeight:1.5, marginBottom:6 }}>
                    {p && <strong style={{ color:'rgba(255,255,255,0.97)' }}>{p.name} · </strong>}
                    {item.text}
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                    <span style={{ fontSize:11, color:'rgba(255,255,255,0.3)' }}>{item.time}</span>
                    <button onClick={() => toggleLike(item.id)} style={{
                      background:'none', border:'none', cursor:'pointer', padding:0,
                      fontSize:12, color: isLiked ? '#c8ff78' : 'rgba(255,255,255,0.4)',
                      fontWeight:600, display:'flex', alignItems:'center', gap:4,
                    }}>
                      {isLiked ? '♥' : '♡'} {item.likes + (isLiked ? 1 : 0)}
                    </button>
                    {item.comments > 0 && (
                      <span style={{ fontSize:12, color:'rgba(255,255,255,0.35)' }}>
                        💬 {item.comments}
                      </span>
                    )}
                  </div>
                </div>
              </div>
            </GlassCard>
          );
        })}
      </div>
    </div>
  );
}

function ScreenImpostazioni({ addToast }) {
  const [tab, setTab] = useState('Disponibilità');

  const [city, setCity]           = useState('Milano');

    <button onClick={() => onChange(!value)} style={{

      background: value ? 'rgba(185,255,90,0.85)' : 'rgba(255,255,255,0.15)',
      transition:'background 0.2s ease', flexShrink:0,
    }}>
      <div style={{
        position:'absolute', top:3, left: value ? 23 : 3, width:18, height:18, borderRadius:'50%',
        background:'white', boxShadow:'0 1px 4px rgba(0,0,0,0.3)',

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>

      <SegmentedControl
        options={['Disponibilità','Frequenza','Profilo','Notifiche']}

          <div style={{ overflowX:'auto' }}>
            <div style={{ display:'grid', gridTemplateColumns:'100px repeat(7,1fr)', gap:8, minWidth:500 }}>
              <div />
              {days.map(d => (
                <div key={d} style={{ textAlign:'center', fontSize:11, fontWeight:700,
                  color:'rgba(255,255,255,0.5)', letterSpacing:'0.06em', paddingBottom:6 }}>{d}</div>

              {slots.map((slot, ri) => (
                <React.Fragment key={ri}>

                    fontSize:11, color:'rgba(255,255,255,0.45)', lineHeight:1.4,

                  {avail[ri].map((on, ci) => (
                    <div key={ci} onClick={() => toggleAvail(ri, ci)} style={{
                      height:44, borderRadius:10, cursor:'pointer',
                      background: on ? 'rgba(185,255,90,0.22)' : 'rgba(255,255,255,0.05)',
                      border: on ? '1px solid rgba(185,255,90,0.5)' : '1px solid rgba(255,255,255,0.1)',
                      boxShadow: on ? '0 0 12px rgba(185,255,90,0.2)' : 'none',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:14, color: on ? '#c8ff78' : 'rgba(255,255,255,0.2)',

            </div>
          </div>
          <div style={{ marginTop:20, display:'flex', gap:10, justifyContent:'flex-end' }}>

                { label:`${freqIdeal}–${freqMax-1} partite`, status:'yellow', desc:'🟡 Forse disponibile — probabilità media' },
                { label:`${freqMax}+ partite`,               status:'red',   desc:'🔴 Occupato — bassa probabilità' },

      {/* Notifiche */}
      {tab === 'Notifiche' && (
        <GlassCard style={{ padding:'24px 26px' }}>
          <SectionTitle>Preferenze Notifiche</SectionTitle>
          <div style={{ display:'flex', flexDirection:'column', gap:2 }}>

              { label:'Badge conquistati',             desc:'Quando sblocchi un nuovo achievement',                  val:true,         set:()=>{}          },
              { label:'Nuovi giocatori in lega',       desc:'Quando un nuovo membro si unisce alla tua lega',        val:false,        set:()=>{}          },

          <div style={{ marginTop:16, display:'flex', justifyContent:'flex-end' }}>
            <BtnPrimary small onClick={save}>Salva preferenze</BtnPrimary>
          </div>
        </GlassCard>
      )}
    </div>
  );
}

      </div>
      <GlassCard style={{ padding:'20px 24px' }}>
        <div style={{ marginBottom:14 }}>
          <GlassInput placeholder="Cerca giocatore…" value={search} onChange={setSearch} />
        </div>
        <div style={{
          display:'grid', gridTemplateColumns:'44px 1fr 90px 70px 60px 80px 80px',
          padding:'8px 14px', fontSize:10, fontWeight:700,
          color:'rgba(255,255,255,0.3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4,
        }}>
          <div>#</div><div>Giocatore</div>
          <div style={{ textAlign:'right' }}>Punti</div>
          <div style={{ textAlign:'right' }}>Var.</div>
          <div style={{ textAlign:'center' }}>Freq.</div>
          <div style={{ textAlign:'center' }}>Attività</div>
          <div style={{ textAlign:'right' }}>Win%</div>
        </div>
        {filtered.map(p => {
          const st = PLAYER_STATUS[p.id] ?? { freq:'green', hot:false };
          const isCurrent = p.id === 'luca';
          const medal = ['🥇','🥈','🥉'];
          return (
            <div key={p.id} onClick={() => onPlayerClick(p)}
              style={{
                display:'grid', gridTemplateColumns:'44px 1fr 90px 70px 60px 80px 80px',
                alignItems:'center', padding:'10px 14px', borderRadius:14, cursor:'pointer',
                background: isCurrent ? 'rgba(185,255,90,0.10)' : 'transparent',
                border: isCurrent ? '1px solid rgba(185,255,90,0.3)' : '1px solid transparent',
                transition:'all 0.15s', marginBottom:2,
              }}
              onMouseEnter={e => { if(!isCurrent) e.currentTarget.style.background='rgba(255,255,255,0.06)'; }}
              onMouseLeave={e => { if(!isCurrent) e.currentTarget.style.background='transparent'; }}>
              <div style={{ fontSize:14, fontWeight:700 }}>
                {p.ranking <= 3 ? medal[p.ranking-1] : <span style={{ color:'rgba(255,255,255,0.5)' }}>{p.ranking}</span>}
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <Avatar player={p} size={30} />
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color: isCurrent ? '#c8ff78' : 'rgba(255,255,255,0.9)' }}>{p.name}</div>
                  <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)' }}>Livello {p.level}</div>
                </div>
              </div>
              <div style={{ fontSize:14, fontWeight:700, color:'rgba(255,255,255,0.95)', textAlign:'right' }}>{p.points.toLocaleString()}</div>
              <div style={{ textAlign:'right' }}>
                {p.variation === 0
                  ? <span style={{ color:'rgba(255,255,255,0.3)', fontSize:12 }}>—</span>
                  : <span style={{ color: p.variation > 0 ? '#b0ef60' : '#f09090', fontSize:12, fontWeight:700 }}>
                      {p.variation > 0 ? `▲${p.variation}` : `▼${Math.abs(p.variation)}`}
                    </span>
                }
              </div>
              <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:4 }}>
                <FreqDot status={st.freq} size={9} />
                <span style={{ fontSize:10, color:'rgba(255,255,255,0.35)' }}>{st.weeklyPlayed}/{st.weeklyMax}</span>
              </div>
              <div style={{ display:'flex', justifyContent:'center' }}>
                <HotBadge hot={st.hot} />
              </div>
              <div style={{ fontSize:13, color:'rgba(255,255,255,0.7)', textAlign:'right' }}>{p.winRate}%</div>
            </div>
          );
        })}
        <div style={{ marginTop:14, fontSize:11, color:'rgba(255,255,255,0.28)', textAlign:'center' }}>
          La classifica si aggiorna dopo ogni partita competitiva validata
        </div>
      </GlassCard>
    </div>
  );
}

Object.assign(window, {
  FreqDot, HotBadge,
  ScreenGiocatori, ScreenSfide,
  ScreenStatistiche, ScreenMessaggi,
  ScreenImpostazioni, ScreenClassificaV2,
});


const { useState, useEffect, useRef, useCallback } = React;

const NAV_ITEMS = [
  { id:'dashboard',    label:'Dashboard',    icon:'⊞' },
  { id:'classifica',   label:'Classifica',   icon:'🏆' },
  { id:'partite',      label:'Partite',      icon:'🎾' },
  { id:'calendario',   label:'Calendario',   icon:'📅' },
  { id:'giocatori',    label:'Giocatori',    icon:'👥' },
  { id:'sfide',        label:'Sfide',        icon:'⚡', badge:2 },
  { id:'statistiche',  label:'Statistiche',  icon:'📊' },
  { id:'messaggi',     label:'Messaggi',     icon:'💬', badge:3 },
  { id:'impostazioni', label:'Impostazioni', icon:'⚙' },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 85,
  "glassOpacity": 11,
  "bgVariant": "blue-green",
  "sidebarWidth": 240
}/*EDITMODE-END*/;

function Sidebar({ active, onNavigate, tw }) {
  const cp = CURRENT_PLAYER;
  const hue = tw.accentHue;
  const accentC   = `oklch(0.82 0.22 ${hue})`;
  const accentBg  = `oklch(0.82 0.22 ${hue} / 0.18)`;
  const accentBdr = `oklch(0.82 0.22 ${hue} / 0.35)`;
  return (
    <div style={{
      width:tw.sidebarWidth, flexShrink:0, display:'flex', flexDirection:'column',
      background:'linear-gradient(180deg,rgba(255,255,255,0.10),rgba(255,255,255,0.06))',
      border:'1px solid rgba(255,255,255,0.13)', borderRadius:24,
      backdropFilter:'blur(28px) saturate(140%)',
      boxShadow:'0 24px 70px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.18)',
      padding:'20px 14px', height:'100%', overflow:'hidden',
    }}>
      {/* Logo */}
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0 6px 20px', borderBottom:'1px solid rgba(255,255,255,0.09)' }}>
        <div style={{
          width:36, height:36, borderRadius:12, flexShrink:0,
          background:`linear-gradient(135deg, oklch(0.85 0.22 ${hue}), oklch(0.62 0.24 ${hue}))`,
          boxShadow:`0 0 20px oklch(0.75 0.22 ${hue} / 0.45)`,
          position:'relative', overflow:'hidden',
        }}>
          <div style={{ position:'absolute', top:5, left:6, width:24, height:24, borderRadius:'50%', border:'1.5px solid rgba(0,0,0,0.2)' }} />
          <div style={{ position:'absolute', top:5, left:6, width:24, height:24, borderRadius:'50%', borderLeft:'1.5px solid rgba(255,255,255,0.65)', transform:'rotate(-30deg)' }} />
        </div>
        <div>
          <div style={{ fontSize:13, fontWeight:800, color:'rgba(255,255,255,0.95)', letterSpacing:'-0.01em' }}>Tennisillo</div>
          <div style={{ fontSize:10, color:'rgba(255,255,255,0.38)', fontWeight:500 }}>friendly neighborhood racket</div>
        </div>
      </div>
      {/* Nav */}
      <nav style={{ flex:1, display:'flex', flexDirection:'column', gap:3, padding:'14px 0', overflowY:'auto' }}>
        {NAV_ITEMS.map(item => {
          const on = active === item.id;
          return (
            <button key={item.id} onClick={() => onNavigate(item.id)} style={{
              display:'flex', alignItems:'center', gap:10, padding:'9px 12px', borderRadius:12,
              border: on ? `1px solid ${accentBdr}` : '1px solid transparent',
              background: on ? accentBg : 'transparent', cursor:'pointer',
              color: on ? accentC : 'rgba(255,255,255,0.6)',
              fontSize:13, fontWeight: on ? 700 : 500, transition:'all 0.18s ease',
              boxShadow: on ? `0 0 20px oklch(0.75 0.22 ${hue} / 0.14)` : 'none', textAlign:'left',
            }}
            onMouseEnter={e=>{ if(!on){ e.currentTarget.style.background='rgba(255,255,255,0.07)'; e.currentTarget.style.color='rgba(255,255,255,0.9)'; }}}
            onMouseLeave={e=>{ if(!on){ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='rgba(255,255,255,0.6)'; }}}>
              <span style={{ fontSize:15, width:20, textAlign:'center', flexShrink:0 }}>{item.icon}</span>
              <span style={{ flex:1 }}>{item.label}</span>
              {item.badge && (
                <span style={{ background:'rgba(185,255,90,0.2)', border:`1px solid ${accentBdr}`,
                  color:accentC, borderRadius:999, padding:'1px 7px', fontSize:10, fontWeight:800 }}>
                  {item.badge}
                </span>
              )}
            </button>
          );
        })}
      </nav>
      {/* User */}
      <div style={{ padding:'14px 10px 4px', borderTop:'1px solid rgba(255,255,255,0.09)',
        display:'flex', alignItems:'center', gap:10, cursor:'pointer' }}
        onClick={() => onNavigate('profilo-self')}>
        <Avatar player={cp} size={36} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.9)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{cp.name}</div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)' }}>Livello {cp.level}</div>
        </div>
        <div style={{ fontSize:14, color:'rgba(255,255,255,0.35)' }}>›</div>
      </div>
      <div style={{ padding:'8px 10px 0' }}>
        <div style={{ height:3, borderRadius:999, background:'rgba(255,255,255,0.1)', overflow:'hidden' }}>
          <div style={{
            height:'100%', width:'78%', borderRadius:999,
            background:`linear-gradient(90deg, oklch(0.62 0.24 ${hue}), oklch(0.82 0.22 ${hue}))`,
            boxShadow:`0 0 8px oklch(0.75 0.22 ${hue} / 0.5)`,
          }} />
        </div>
        <div style={{ fontSize:10, color:'rgba(255,255,255,0.28)', marginTop:4 }}>2.340 / 3.000 XP</div>
      </div>
    </div>
  );
}

const BG = {
  'blue-green': 'radial-gradient(ellipse at 10% 0%, rgba(185,255,90,0.14) 0%, transparent 30%), radial-gradient(ellipse at 82% 18%, rgba(121,167,216,0.22) 0%, transparent 30%), linear-gradient(145deg,#071517 0%,#17304A 55%,#0B1A1C 100%)',
  'deep-navy':  'radial-gradient(ellipse at 10% 0%, rgba(185,255,90,0.10) 0%, transparent 25%), linear-gradient(145deg,#060d1a 0%,#0d1e3a 60%,#060d1a 100%)',
  'forest':     'radial-gradient(ellipse at 10% 0%, rgba(185,255,90,0.18) 0%, transparent 30%), linear-gradient(145deg,#071510 0%,#0d2a18 55%,#071510 100%)',
};

function App() {
  const [page, setPage] = useState('dashboard');
  const [profilePlayer, setProfilePlayer] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const addToast = useCallback((t) => {
    const id = Date.now();
    setToasts(ts => [...ts, { ...t, id }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 3500);
  }, []);

  const navigate = (p) => setPage(p);
  const openPlayer = (player) => { setProfilePlayer(player); setPage('profilo'); };
  const glassOp = tw.glassOpacity / 100;

  const renderPage = () => {
    const props = { onNavigate: navigate, addToast };
    if (page === 'dashboard')     return <Dashboard {...props} onPlayerClick={openPlayer} />;
    if (page === 'classifica')    return <ScreenClassificaV2 onPlayerClick={openPlayer} />;
    if (page === 'partite')       return <ScreenPartite {...props} />;
    if (page === 'calendario')    return <ScreenCalendario />;
    if (page === 'nuova-partita') return <ScreenNuovaPartita {...props} />;
    if (page === 'giocatori')     return <ScreenGiocatori {...props} onPlayerClick={openPlayer} />;
    if (page === 'sfide')         return <ScreenSfide addToast={addToast} />;
    if (page === 'statistiche')   return <ScreenStatistiche onPlayerClick={openPlayer} />;
    if (page === 'messaggi')      return <ScreenMessaggi addToast={addToast} />;
    if (page === 'impostazioni')  return <ScreenImpostazioni addToast={addToast} />;
    if (page === 'profilo')       return <ScreenProfilo player={profilePlayer} addToast={addToast} />;
    if (page === 'profilo-self')  return <ScreenProfilo player={CURRENT_PLAYER} addToast={addToast} />;
    return (
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'60vh', gap:12 }}>
        <div style={{ fontSize:48 }}>🚧</div>
        <div style={{ fontSize:20, fontWeight:700, color:'rgba(255,255,255,0.7)' }}>
          {NAV_ITEMS.find(n=>n.id===page)?.label ?? page}
        </div>
        <div style={{ fontSize:14, color:'rgba(255,255,255,0.35)' }}>Schermata in arrivo</div>
      </div>
    );
  };

  const sidebarActive = page === 'nuova-partita' ? 'partite'
    : (page === 'profilo' || page === 'profilo-self') ? 'classifica'
    : page;

  return (
    <div style={{ width:'100vw', height:'100vh', overflow:'hidden',
      background: BG[tw.bgVariant] ?? BG['blue-green'],
      display:'flex', fontFamily:"'Inter', system-ui, sans-serif" }}>
      <div style={{ display:'flex', gap:16, padding:16, width:'100%', height:'100%' }}>
        <Sidebar active={sidebarActive} onNavigate={navigate} tw={tw} />
        <main style={{
          flex:1, overflowY:'auto', borderRadius:24,
          background:`linear-gradient(135deg,rgba(255,255,255,${glassOp}),rgba(255,255,255,${glassOp*0.5}))`,
          border:'1px solid rgba(255,255,255,0.12)', backdropFilter:'blur(18px) saturate(130%)',
          boxShadow:'0 14px 40px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.16)',
          padding:'28px 32px',
        }}>
          <div style={{ maxWidth:1100 }}>{renderPage()}</div>
        </main>
      </div>
      <Toast toasts={toasts} remove={id => setToasts(ts => ts.filter(t => t.id !== id))} />
      <TweaksPanel>
        <TweakSection label="Accento">
          <TweakSlider label="Hue accento" value={tw.accentHue} min={0} max={360} step={5} onChange={v => setTweak('accentHue', v)} />
        </TweakSection>
        <TweakSection label="Materiale">
          <TweakSlider label="Opacità glass" value={tw.glassOpacity} min={4} max={22} step={1} onChange={v => setTweak('glassOpacity', v)} />
          <TweakSelect label="Sfondo" value={tw.bgVariant}
            options={['blue-green','deep-navy','forest']}
            onChange={v => setTweak('bgVariant', v)} />
        </TweakSection>
        <TweakSection label="Layout">
          <TweakSlider label="Larghezza sidebar" value={tw.sidebarWidth} min={200} max={300} step={10} onChange={v => setTweak('sidebarWidth', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
