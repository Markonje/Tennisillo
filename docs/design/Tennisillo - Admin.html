function GlassCard({ children, style, hover, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: hov && hover ? 'linear-gradient(135deg,rgba(255,255,255,0.15),rgba(255,255,255,0.07))' : 'linear-gradient(135deg,rgba(255,255,255,0.11),rgba(255,255,255,0.05))',
        border:'1px solid rgba(255,255,255,0.13)', borderRadius:20,
        backdropFilter:'blur(26px) saturate(140%)',
        boxShadow: hov && hover ? '0 22px 55px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.2)' : '0 14px 40px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.16)',
        transform: hov && hover ? 'translateY(-1px)' : 'none',
        transition:'all 0.2s ease', cursor: onClick ? 'pointer' : 'default',
        ...style,
      }}>{children}</div>
  );
}

function GlassInput({ label, value, onChange, placeholder, type='text' }) {
  const [focus, setFocus] = useState(false);
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
      {label && <label style={{ fontSize:12, color:'rgba(255,255,255,0.5)', fontWeight:500 }}>{label}</label>}
      <input type={type} value={value} onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
        style={{
          background: focus ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.07)',
          border:`1px solid ${focus ? 'rgba(185,255,90,0.5)' : 'rgba(255,255,255,0.13)'}`,
          borderRadius:11, padding:'9px 13px', color:'rgba(255,255,255,0.92)',
          fontSize:13, outline:'none', width:'100%',
          boxShadow: focus ? '0 0 0 3px rgba(185,255,90,0.10)' : 'none',
          transition:'all 0.16s ease',
        }} />
    </div>
  );
}

function GlassSelect({ label, value, onChange, options }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
      {label && <label style={{ fontSize:12, color:'rgba(255,255,255,0.5)', fontWeight:500 }}>{label}</label>}
      <select value={value} onChange={e => onChange(e.target.value)} style={{
        background:'rgba(10,24,32,0.9)', border:'1px solid rgba(255,255,255,0.13)',
        borderRadius:11, padding:'9px 13px', color:'rgba(255,255,255,0.92)',
        fontSize:13, outline:'none', width:'100%', cursor:'pointer',
      }}>
        {options.map(o => <option key={o.value ?? o} value={o.value ?? o}>{o.label ?? o}</option>)}
      </select>
    </div>
  );
}

function Toggle({ value, onChange, small }) {
  const w = small ? 36 : 44; const h = small ? 20 : 24; const knob = small ? 14 : 18;
  return (
    <button onClick={() => onChange(!value)} style={{
      width:w, height:h, borderRadius:999, border:'none', cursor:'pointer',
      background: value ? 'rgba(185,255,90,0.85)' : 'rgba(255,255,255,0.18)',
      position:'relative', transition:'background 0.2s ease', flexShrink:0,
    }}>
      <div style={{
        position:'absolute', top:(h-knob)/2, left: value ? w-knob-3 : 3,
        width:knob, height:knob, borderRadius:'50%', background:'white',
        boxShadow:'0 1px 4px rgba(0,0,0,0.3)', transition:'left 0.2s ease',
      }} />
    </button>
  );
}

function BtnPrimary({ children, onClick, small, disabled }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: disabled ? 'rgba(185,255,90,0.3)' : hov ? 'linear-gradient(135deg,#d8ff88,#a0ef5a)' : 'linear-gradient(135deg,#c8ff6a,#8ee044)',
        color:'#0a1a0e', fontWeight:700, border:'none', cursor: disabled ? 'not-allowed' : 'pointer',
        padding: small ? '7px 15px' : '10px 20px',
        borderRadius:12, fontSize: small ? 12 : 13,
        boxShadow: disabled ? 'none' : `0 6px 20px rgba(185,255,90,${hov?0.38:0.22})`,
        transform: hov && !disabled ? 'translateY(-1px)' : 'none',
        transition:'all 0.16s ease',
        display:'flex', alignItems:'center', gap:6, whiteSpace:'nowrap',
      }}>{children}</button>
  );
}

function BtnSecondary({ children, onClick, small, danger, warning }) {
  const [hov, setHov] = useState(false);
  const bg  = danger  ? (hov ? 'rgba(233,109,109,0.22)' : 'rgba(233,109,109,0.12)')
            : warning ? (hov ? 'rgba(242,211,94,0.22)'  : 'rgba(242,211,94,0.12)')
            : (hov ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.08)');
  const clr = danger ? '#f09090' : warning ? '#f5d96a' : 'rgba(255,255,255,0.85)';
  const bdr = danger ? 'rgba(233,109,109,0.4)' : warning ? 'rgba(242,211,94,0.4)' : 'rgba(255,255,255,0.18)';
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background:bg, color:clr, border:`1px solid ${bdr}`,
        cursor:'pointer', padding: small ? '7px 15px' : '10px 20px',
        borderRadius:12, fontSize: small ? 12 : 13, fontWeight:600,
        transition:'all 0.16s ease', display:'flex', alignItems:'center', gap:6, whiteSpace:'nowrap',
      }}>{children}</button>
  );
}

function Badge({ children, tone }) {
  const map = {
    green:  { bg:'rgba(185,255,90,0.18)',  bdr:'rgba(185,255,90,0.4)',  c:'#c8ff78' },
    yellow: { bg:'rgba(242,211,94,0.18)',  bdr:'rgba(242,211,94,0.4)',  c:'#f5d96a' },
    red:    { bg:'rgba(233,109,109,0.18)', bdr:'rgba(233,109,109,0.4)', c:'#f09090' },
    blue:   { bg:'rgba(121,167,216,0.18)', bdr:'rgba(121,167,216,0.4)', c:'#9abfdd' },
    gray:   { bg:'rgba(255,255,255,0.08)', bdr:'rgba(255,255,255,0.18)',c:'rgba(255,255,255,0.5)' },
  };
  const s = map[tone] ?? map.gray;
  return (
    <span style={{ padding:'2px 9px', borderRadius:999, fontSize:11, fontWeight:700,
      background:s.bg, border:`1px solid ${s.bdr}`, color:s.c, whiteSpace:'nowrap' }}>
      {children}
    </span>
  );
}

function Avatar({ p, size=32 }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%', flexShrink:0,
      background:`linear-gradient(135deg,oklch(0.72 0.18 ${p.hue}),oklch(0.55 0.22 ${p.hue}))`,

      border:'1.5px solid rgba(255,255,255,0.2)',
    }}>{p.initials}</div>

}

function SectionTitle({ children, sub }) {
  return (
    <div style={{ marginBottom:16 }}>
      <h2 style={{ margin:0, fontSize:18, fontWeight:800, color:'rgba(255,255,255,0.97)', letterSpacing:'-0.02em' }}>{children}</h2>
      {sub && <p style={{ margin:'4px 0 0', fontSize:13, color:'rgba(255,255,255,0.42)' }}>{sub}</p>}
    </div>
  );
}

function RepBar({ score }) {
  const color = score >= 80 ? '#B9FF5A' : score >= 60 ? '#F2D35E' : '#E96D6D';
  const label = score >= 80 ? 'Buona' : score >= 60 ? 'Attenzione' : 'A rischio';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
      <div style={{ flex:1, height:5, borderRadius:999, background:'rgba(255,255,255,0.1)', minWidth:60 }}>
        <div style={{ height:'100%', width:`${score}%`, borderRadius:999, background:color, transition:'width 0.4s' }} />
      </div>
      <span style={{ fontSize:11, fontWeight:700, color, minWidth:40 }}>{score}</span>
    </div>
  );
}

function Toast({ toasts, remove }) {
  return (
    <div style={{ position:'fixed', top:20, right:20, zIndex:9999, display:'flex', flexDirection:'column', gap:8, pointerEvents:'none' }}>
      {toasts.map(t => {
        const s = { success:{ bg:'rgba(185,255,90,0.15)', bdr:'rgba(185,255,90,0.4)',c:'#c8ff78',icon:'✓' },
                    info:   { bg:'rgba(121,167,216,0.15)',bdr:'rgba(121,167,216,0.4)',c:'#9abfdd',icon:'ℹ' },
                    warning:{ bg:'rgba(242,211,94,0.15)', bdr:'rgba(242,211,94,0.4)', c:'#f5d96a',icon:'!' },
                    danger: { bg:'rgba(233,109,109,0.15)',bdr:'rgba(233,109,109,0.4)',c:'#f09090',icon:'✕' },
                  }[t.tone] ?? { bg:'rgba(255,255,255,0.1)',bdr:'rgba(255,255,255,0.2)',c:'white',icon:'•' };
        return (
          <div key={t.id} style={{
            background:s.bg, border:`1px solid ${s.bdr}`, borderRadius:13,
            padding:'11px 15px', backdropFilter:'blur(24px)', pointerEvents:'all',
            display:'flex', alignItems:'center', gap:10, minWidth:260,
            boxShadow:'0 10px 30px rgba(0,0,0,0.3)', animation:'slideIn 0.22s ease',
          }}>
            <span style={{ color:s.c, fontWeight:700, fontSize:13 }}>{s.icon}</span>
            <span style={{ fontSize:13, color:'rgba(255,255,255,0.9)', flex:1 }}>{t.message}</span>
            <button onClick={() => remove(t.id)} style={{ background:'none', border:'none', color:'rgba(255,255,255,0.4)', cursor:'pointer', fontSize:13 }}>✕</button>
          </div>
        );
      })}
    </div>
  );
}

// ── DASHBOARD ADMIN ───────────────────────────────────────────────────────────
function ScreenDashboard({ setPage, addToast }) {
  const openDisputes = DISPUTES.filter(d => d.status === 'open').length;
  const highAlerts   = PATTERN_ALERTS.filter(a => a.severity === 'high').length;
  const flagged      = FLAGGED_MATCHES.filter(f => !f.reviewed).length;
  const pct          = Math.round((SEASON.week / SEASON.totalWeeks) * 100);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <h1 style={{ margin:0, fontSize:28, fontWeight:800, color:'rgba(255,255,255,0.97)', letterSpacing:'-0.02em' }}>Dashboard Admin</h1>
          <p style={{ margin:'4px 0 0', fontSize:14, color:'rgba(255,255,255,0.45)' }}>{LEAGUE.name} · Stagione {SEASON.week}/{SEASON.totalWeeks}</p>
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <a href="Tennisillo.html" style={{ textDecoration:'none' }}>
            <BtnSecondary small>👁 Vista giocatore</BtnSecondary>
          </a>
          <BtnPrimary small onClick={() => addToast({ message:'Annuncio inviato a tutti i giocatori.', tone:'success' })}>
            📢 Invia annuncio
          </BtnPrimary>
        </div>
      </div>

      {/* KPI */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14 }}>
        {[
          { icon:'👥', label:'Giocatori attivi',  value:`${PLAYERS.filter(p=>p.status==='active').length}/${PLAYERS.length}`, delta:'2 inviti pendenti',  tone:'neutral' },
          { icon:'🎾', label:'Partite stagione',  value:PLAYERS.reduce((s,p)=>s+p.matches,0)/2|0,              delta:`Sett. ${SEASON.week}/${SEASON.totalWeeks}`, tone:'neutral' },
          { icon:'⚠️', label:'Dispute aperte',    value:openDisputes,                          delta:openDisputes>0?'Azione richiesta':'Tutto ok',   tone: openDisputes>0?'warn':'ok' },
          { icon:'🚨', label:'Alert anti-frode',  value:highAlerts+flagged,                    delta:`${highAlerts} alta priorità`,                  tone: highAlerts>0?'danger':'ok' },
        ].map(k => (
          <GlassCard key={k.label} style={{ padding:'18px 20px' }}>
            <div style={{ fontSize:20, marginBottom:5 }}>{k.icon}</div>
            <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 }}>{k.label}</div>
            <div style={{ fontSize:28, fontWeight:900, color:'rgba(255,255,255,0.97)', letterSpacing:'-0.03em', lineHeight:1 }}>{k.value}</div>
            <div style={{ fontSize:12, marginTop:5, color: k.tone==='danger'?'#f09090':k.tone==='warn'?'#f5d96a':'rgba(255,255,255,0.4)' }}>{k.delta}</div>
          </GlassCard>
        ))}
      </div>

      {/* Urgent alerts */}
      {(openDisputes > 0 || highAlerts > 0 || flagged > 0) && (
        <GlassCard style={{ padding:'16px 20px', border:'1px solid rgba(233,109,109,0.3)', background:'rgba(233,109,109,0.07)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>

// ── CONFIGURAZIONE PUNTEGGIO ──────────────────────────────────────────────────
function ScreenPunteggio({ addToast }) {
  const [cfg, setCfg] = useState({ ...SEASON.config });
  const set = k => v => setCfg(c => ({ ...c, [k]:v }));
  const save = () => addToast({ message:'Configurazione punteggio salvata.', tone:'success' });

  const calcPreview = () => {
    const base = cfg.baseWin;
    const mLiv = { off:1.0, soft:1.25, normal:1.5, hard:2.0 }[cfg.mLivello] ?? 1.0;
    const cost = cfg.bCostanza ? 10 : 0;
    const div  = cfg.bDiversificazione ? 15 : 0;
    return Math.round(base * mLiv + cost + div);
  };

  const Row = ({ label, children, border=true }) => (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
      padding:'12px 0', borderBottom: border ? '1px solid rgba(255,255,255,0.07)' : 'none' }}>
      <span style={{ fontSize:13, color:'rgba(255,255,255,0.7)', flex:1 }}>{label}</span>
      <div style={{ flexShrink:0, minWidth:160 }}>{children}</div>
    </div>
  );

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <SectionTitle sub="Parametri modificabili prima e durante la stagione (§8.13)">Configurazione Punteggio</SectionTitle>
        <BtnPrimary small onClick={save}>💾 Salva configurazione</BtnPrimary>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 320px', gap:16 }}>
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>

          {/* Punti base */}
          <GlassCard style={{ padding:'20px 24px' }}>
            <div style={{ fontSize:14, fontWeight:700, color:'rgba(255,255,255,0.85)', marginBottom:14 }}>Punti Base</div>
            <Row label="Punti base vittoria (50–200)">
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <input type="range" min={50} max={200} step={10} value={cfg.baseWin}
                  onChange={e => set('baseWin')(Number(e.target.value))}
                  style={{ flex:1, accentColor:'#B9FF5A' }} />
                <span style={{ fontSize:14, fontWeight:800, color:'#c8ff78', minWidth:36, textAlign:'right' }}>{cfg.baseWin}</span>
              </div>
            </Row>
            <Row label="Punti base sconfitta (0–50)">
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <input type="range" min={0} max={50} step={5} value={cfg.baseLoss}
                  onChange={e => set('baseLoss')(Number(e.target.value))}
                  style={{ flex:1 }} />
                <span style={{ fontSize:14, fontWeight:800, color:'rgba(255,255,255,0.7)', minWidth:36, textAlign:'right' }}>{cfg.baseLoss}</span>
              </div>
            </Row>
          </GlassCard>

          {/* Moltiplicatori */}

            <div style={{ fontSize:14, fontWeight:700, color:'rgba(255,255,255,0.85)', marginBottom:14 }}>Moltiplicatori e Bonus</div>
            <Row label="Intensità moltiplicatore livello">
              <div style={{ display:'flex', gap:6 }}>
                {['off','soft','normal','hard'].map(v => (
                  <button key={v} onClick={() => set('mLivello')(v)} style={{
                    padding:'5px 10px', borderRadius:8, border:'none', cursor:'pointer', fontSize:11, fontWeight:700,
                    background: cfg.mLivello === v ? 'rgba(185,255,90,0.25)' : 'rgba(255,255,255,0.08)',
                    color: cfg.mLivello === v ? '#c8ff78' : 'rgba(255,255,255,0.5)',

          </GlassCard>

          </GlassCard>
        </div>
      </div>
    </div>
  );
}

function ScreenCampi({ addToast }) {
  const [campi, setCampi]     = useState(CAMPI);

  const [editField, setEditField] = useState(null);
  const [form, setForm] = useState({ name:'', address:'', surface:'Terra rossa', cover:'Scoperto', price:'', link:'', phone:'' });
  const setF = k => v => setForm(f => ({ ...f, [k]:v }));

  const surfaceIcon = { 'Terra rossa':'🔶', 'Cemento':'⬜', 'Sintetico':'🟩', 'Erba':'🌿' };
  const coverIcon   = { 'Scoperto':'☀️', 'Coperto':'🏗', 'Misto':'⛅' };

  const approve = (id) => {
    setCampi(c => c.map(f => f.id===id ? { ...f, status:'active' } : f));
    addToast({ message:'Campo approvato e pubblicato!', tone:'success' });

    setCampi(c => c.map(f => f.id===id ? { ...f, status:'archived' } : f));

            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              <GlassInput label="Nome campo *" value={form.name} onChange={setF('name')} placeholder="es. Tennis Club Milano — Campo 3" />

  const [tab, setTab] = useState('dispute');

  const tabs = { dispute:'⚔️ Dispute', pattern:'⚠️ Pattern alert', flag:'🚩 Partite flaggate', rep:'🔒 Reputazione' };
  const pColors = { high:'#f09090', medium:'#f5d96a', low:'rgba(255,255,255,0.5)' };

  const resolveDispute = (id, decision) => {
    setDisputes(d => d.map(x => x.id===id ? { ...x, status:'resolved' } : x));
    addToast({ message:`Disputa ${id} risolta: "${decision}" applicato.`, tone:'success' });
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <SectionTitle sub="Dispute, pattern anomali, partite flaggate e reputazione giocatori">Anti-Frode</SectionTitle>

      <div style={{ display:'flex', gap:3, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:12, padding:3, width:'fit-content' }}>
        {Object.entries(tabs).map(([k, v]) => {
          const count = k==='dispute' ? disputes.filter(d=>d.status==='open').length
            : k==='pattern' ? PATTERN_ALERTS.filter(a=>a.severity==='high').length
            : k==='flag' ? flagged.filter(f=>!f.reviewed).length : 0;
          return (
            <button key={k} onClick={() => setTab(k)} style={{
              padding:'7px 14px', borderRadius:9, border:'none', cursor:'pointer',
              background: tab===k ? (k==='dispute'||k==='flag' ? 'rgba(233,109,109,0.18)' : k==='pattern' ? 'rgba(242,211,94,0.18)' : 'rgba(185,255,90,0.18)') : 'transparent',
              color: tab===k ? (k==='dispute'||k==='flag' ? '#f09090' : k==='pattern' ? '#f5d96a' : '#c8ff78') : 'rgba(255,255,255,0.55)',
              fontSize:12, fontWeight: tab===k ? 700 : 500, transition:'all 0.15s',
              display:'flex', alignItems:'center', gap:5,
            }}>
              {v}
              {count > 0 && <span style={{
                background:'rgba(233,109,109,0.3)', color:'#f09090', borderRadius:999, padding:'0 6px', fontSize:10, fontWeight:800,
              }}>{count}</span>}
            </button>
          );
        })}
      </div>

      {/* DISPUTE */}
      {tab === 'dispute' && (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {disputes.map(d => (
            <GlassCard key={d.id} style={{ padding:'18px 22px',
              border: d.status==='open' ? `1px solid ${d.priority==='high'?'rgba(233,109,109,0.3)':'rgba(242,211,94,0.2)'}` : '1px solid rgba(255,255,255,0.1)',
              background: d.status==='open' ? (d.priority==='high'?'rgba(233,109,109,0.07)':'rgba(242,211,94,0.05)') : 'linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.03))',
            }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:14 }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                    <span style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.4)' }}>{d.matchId}</span>
                    {d.status==='open'
                      ? <Badge tone={d.priority==='high'?'red':d.priority==='medium'?'yellow':'gray'}>
                          {d.priority==='high'?'🔴 Alta priorità':d.priority==='medium'?'🟡 Media':'🟢 Bassa'}
                        </Badge>
                      : <Badge tone="gray">✓ Risolta</Badge>
                    }
                    <span style={{ fontSize:11, color:'rgba(255,255,255,0.35)', marginLeft:'auto' }}>{d.date}</span>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                    <Avatar p={d.playerA} size={32} />
                    <div>
                      <div style={{ fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.9)' }}>{d.playerA.name}</div>
                      <div style={{ fontSize:12, color:'#c8ff78', fontFamily:'monospace', fontWeight:700 }}>{d.scoreA}</div>
                    </div>
                    <div style={{ padding:'4px 10px', background:'rgba(255,255,255,0.08)', borderRadius:8,
                      fontSize:11, fontWeight:700, color:'rgba(255,255,255,0.5)' }}>VS</div>
                    <Avatar p={d.playerB} size={32} />
                    <div>
                      <div style={{ fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.9)' }}>{d.playerB.name}</div>
                      <div style={{ fontSize:12, color:'#f09090', fontFamily:'monospace', fontWeight:700 }}>{d.scoreB}</div>
                    </div>
                  </div>
                  <div style={{ fontSize:12, color:'rgba(255,255,255,0.5)', padding:'8px 10px',
                    background:'rgba(255,255,255,0.05)', borderRadius:8 }}>
                    I due giocatori riportano punteggi diversi. Arbitrato admin richiesto.
                  </div>
                </div>
                {d.status==='open' && (
                  <div style={{ display:'flex', flexDirection:'column', gap:8, flexShrink:0 }}>
                    <BtnPrimary small onClick={() => resolveDispute(d.id, `Vince ${d.playerA.name} ${d.scoreA}`)}>
                      ✓ Versione {d.playerA.name.split(' ')[0]}
                    </BtnPrimary>
                    <BtnPrimary small onClick={() => resolveDispute(d.id, `Vince ${d.playerB.name} ${d.scoreB}`)}>
                      ✓ Versione {d.playerB.name.split(' ')[0]}
                    </BtnPrimary>
                    <BtnSecondary small danger onClick={() => resolveDispute(d.id, 'Partita annullata')}>
                      Annulla partita
                    </BtnSecondary>
                  </div>
                )}
              </div>
            </GlassCard>
          ))}
        </div>
      )}

      {/* PATTERN */}
      {tab === 'pattern' && (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {PATTERN_ALERTS.map(a => (
            <GlassCard key={a.id} style={{ padding:'18px 22px',
              border:`1px solid ${a.severity==='high'?'rgba(233,109,109,0.3)':a.severity==='medium'?'rgba(242,211,94,0.25)':'rgba(255,255,255,0.1)'}`,
              background: a.severity==='high'?'rgba(233,109,109,0.07)':a.severity==='medium'?'rgba(242,211,94,0.05)':'rgba(255,255,255,0.04)',
            }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
                <div style={{ width:38, height:38, borderRadius:12, flexShrink:0,
                  background: a.severity==='high'?'rgba(233,109,109,0.18)':'rgba(242,211,94,0.15)',
                  border:`1px solid ${a.severity==='high'?'rgba(233,109,109,0.4)':'rgba(242,211,94,0.3)'}`,
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>
                  {a.type==='collusion'?'👥':a.type==='sparring_cap'?'⚡':'⏱'}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:4 }}>
                    <Badge tone={a.severity==='high'?'red':a.severity==='medium'?'yellow':'gray'}>
                      {a.severity==='high'?'Alta priorità':a.severity==='medium'?'Media':'Bassa'}
                    </Badge>
                    <span style={{ fontSize:11, color:'rgba(255,255,255,0.35)' }}>{a.date}</span>
                  </div>
                  <div style={{ fontSize:13, color:'rgba(255,255,255,0.85)', lineHeight:1.5, marginBottom:8 }}>{a.desc}</div>
                  <div style={{ display:'flex', gap:6 }}>
                    {a.players.map(pid => {
                      const p = PLAYERS.find(x=>x.id===pid);
                      return p ? (
                        <div key={pid} style={{ display:'flex', alignItems:'center', gap:5, padding:'3px 8px',
                          background:'rgba(255,255,255,0.08)', borderRadius:8, border:'1px solid rgba(255,255,255,0.12)' }}>
                          <Avatar p={p} size={18} />
                          <span style={{ fontSize:11, color:'rgba(255,255,255,0.7)' }}>{p.name}</span>
                        </div>
                      ) : null;
                    })}
                  </div>
                </div>
                <div style={{ display:'flex', gap:6, flexShrink:0 }}>
                  <BtnSecondary small onClick={() => addToast({ message:'Avviso inviato ai giocatori.', tone:'warning' })}>⚠ Avvisa</BtnSecondary>
                  <BtnSecondary small danger onClick={() => addToast({ message:'Alert archiviato.', tone:'info' })}>Archivia</BtnSecondary>
                </div>
              </div>
            </GlassCard>
          ))}
        </div>
      )}

      {/* FLAGGED */}
      {tab === 'flag' && (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {flagged.map(f => (
            <GlassCard key={f.id} style={{ padding:'16px 20px',
              opacity: f.reviewed ? 0.6 : 1,
              border: f.reviewed ? '1px solid rgba(255,255,255,0.1)' : '1px solid rgba(242,211,94,0.25)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <div style={{ width:36, height:36, borderRadius:11, flexShrink:0,
                  background:'rgba(242,211,94,0.15)', border:'1px solid rgba(242,211,94,0.3)',
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>
                  🚩
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:3 }}>
                    <span style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.5)' }}>{f.matchId}</span>
                    <Badge tone={f.reviewed?'gray':'yellow'}>{f.reviewed?'Revisionata':'Da revisionare'}</Badge>
                    <span style={{ fontSize:11, color:'rgba(255,255,255,0.35)' }}>{f.date}</span>
                  </div>
                  <div style={{ fontSize:13, color:'rgba(255,255,255,0.85)', marginBottom:3 }}>
                    {f.players.join(' vs ')} · <span style={{ fontFamily:'monospace', color:'#c8ff78' }}>{f.score}</span>
                  </div>
                  <div style={{ fontSize:12, color:'rgba(255,255,255,0.5)' }}>{f.desc}</div>
                </div>
                {!f.reviewed && (
                  <div style={{ display:'flex', gap:6 }}>
                    <BtnSecondary small onClick={() => {
                      setFlagged(prev => prev.map(x => x.id===f.id ? { ...x, reviewed:true } : x));
                      addToast({ message:'Partita approvata, flag rimosso.', tone:'success' });
                    }}>✓ Approva</BtnSecondary>
                    <BtnSecondary small danger onClick={() => {
                      setFlagged(prev => prev.map(x => x.id===f.id ? { ...x, reviewed:true } : x));
                      addToast({ message:'Partita annullata.', tone:'danger' });
                    }}>✕ Annulla</BtnSecondary>
                  </div>
                )}
              </div>
            </GlassCard>
          ))}
        </div>
      )}

      {/* REPUTAZIONE */}
      {tab === 'rep' && (
        <GlassCard style={{ padding:'20px 24px' }}>
          <div style={{ fontSize:13, color:'rgba(255,255,255,0.45)', marginBottom:16, lineHeight:1.6 }}>
            Il punteggio di reputazione è visibile solo agli admin. Scende con dispute perse, annullamenti, pattern sospetti. Sale con conferme rapide e fair play.
          </div>
          {PLAYERS.sort((a,b) => a.rep-b.rep).map(p => (
            <div key={p.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0',
              borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
              <Avatar p={p} size={32} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                  <span style={{ fontSize:13, fontWeight:600, color: p.rep < 60 ? '#f09090' : p.rep < 80 ? '#f5d96a' : 'rgba(255,255,255,0.9)' }}>
                    {p.name}
                    {p.warnings > 0 && <span style={{ color:'#f09090', marginLeft:8, fontSize:11 }}>⚠ {p.warnings} avvisi</span>}
                  </span>
                  <Badge tone={p.rep>=80?'green':p.rep>=60?'yellow':'red'}>
                    {p.rep >= 80 ? 'Ottima' : p.rep >= 60 ? 'Attenzione' : 'A rischio'}
                  </Badge>
                </div>
                <RepBar score={p.rep} />
              </div>
            </div>
          ))}
        </GlassCard>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SIDEBAR + APP
// ─────────────────────────────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Dashboard',   icon:'⊞' },
  { id:'stagione',  label:'Stagione',    icon:'📅' },
  { id:'punteggio', label:'Punteggio',   icon:'⚙' },
  { id:'giocatori', label:'Giocatori',   icon:'👥' },
  { id:'campi',     label:'Campi',       icon:'📍' },
  { id:'antifrode', label:'Anti-Frode',  icon:'🛡', alert:true },
];

function App() {
  const [page, setPage]   = useState('dashboard');
  const [toasts, setToasts] = useState([]);

  const addToast = useCallback((t) => {
    const id = Date.now();
    setToasts(ts => [...ts, { ...t, id }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 3500);
  }, []);

  const openDisputes = DISPUTES.filter(d => d.status === 'open').length;
  const alerts       = PATTERN_ALERTS.filter(a => a.severity === 'high').length + FLAGGED_MATCHES.filter(f => !f.reviewed).length;

  const renderPage = () => {
    const props = { addToast, setPage };
    if (page === 'dashboard') return <ScreenDashboard {...props} />;
    if (page === 'stagione')  return <ScreenStagione {...props} />;
    if (page === 'punteggio') return <ScreenPunteggio {...props} />;
    if (page === 'giocatori') return <ScreenGiocatori {...props} />;
    if (page === 'campi')     return <ScreenCampi {...props} />;
    if (page === 'antifrode') return <ScreenAntiFrode {...props} />;
    return null;
  };

  return (
    <div style={{ width:'100vw', height:'100vh', overflow:'hidden', background:BG, display:'flex', fontFamily:"'Inter',system-ui,sans-serif" }}>
      <div style={{ display:'flex', gap:14, padding:14, width:'100%', height:'100%' }}>
        {/* Sidebar */}
        <div style={{
          width:230, flexShrink:0, display:'flex', flexDirection:'column',
          background:'linear-gradient(180deg,rgba(255,255,255,0.10),rgba(255,255,255,0.06))',
          border:'1px solid rgba(255,255,255,0.13)', borderRadius:22,
          backdropFilter:'blur(28px) saturate(140%)',
          boxShadow:'0 24px 70px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.18)',
          padding:'18px 12px', height:'100%', overflow:'hidden',
        }}>
          {/* Logo + admin badge */}
          <div style={{ padding:'0 4px 16px', borderBottom:'1px solid rgba(255,255,255,0.09)', marginBottom:4 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
              <div style={{ width:32, height:32, borderRadius:10, flexShrink:0,
                background:'linear-gradient(135deg,oklch(0.85 0.22 85),oklch(0.62 0.24 85))',
                boxShadow:'0 0 18px oklch(0.75 0.22 85 / 0.4)', position:'relative', overflow:'hidden' }}>
                <div style={{ position:'absolute', top:4, left:5, width:22, height:22, borderRadius:'50%', border:'1.5px solid rgba(0,0,0,0.2)' }} />
                <div style={{ position:'absolute', top:4, left:5, width:22, height:22, borderRadius:'50%', borderLeft:'1.5px solid rgba(255,255,255,0.65)', transform:'rotate(-30deg)' }} />
              </div>
              <div>
                <div style={{ fontSize:12, fontWeight:800, color:'rgba(255,255,255,0.95)', letterSpacing:'-0.01em' }}>Tennisillo</div>
                <div style={{ fontSize:9, color:'rgba(255,255,255,0.38)' }}>Admin Panel</div>
              </div>
            </div>
            <div style={{ padding:'5px 10px', background:'rgba(185,255,90,0.12)', border:'1px solid rgba(185,255,90,0.3)', borderRadius:8, textAlign:'center' }}>
              <div style={{ fontSize:11, fontWeight:700, color:'#c8ff78' }}>🔒 Marco Verdi — Admin</div>
              <div style={{ fontSize:10, color:'rgba(185,255,90,0.6)', marginTop:1 }}>{LEAGUE.name.slice(0,22)}…</div>
            </div>
          </div>
          {/* Nav */}
          <nav style={{ flex:1, display:'flex', flexDirection:'column', gap:2, overflowY:'auto' }}>
            {NAV.map(item => {
              const on = page === item.id;
              const badge = item.id==='antifrode' ? openDisputes+alerts : 0;
              return (
                <button key={item.id} onClick={() => setPage(item.id)} style={{
                  display:'flex', alignItems:'center', gap:9, padding:'9px 11px', borderRadius:11,
                  border: on ? '1px solid rgba(185,255,90,0.35)' : '1px solid transparent',
                  background: on ? 'rgba(185,255,90,0.18)' : 'transparent',
                  cursor:'pointer', color: on ? '#c8ff78' : 'rgba(255,255,255,0.6)',
                  fontSize:13, fontWeight: on ? 700 : 500, transition:'all 0.16s', textAlign:'left',
                }}
                onMouseEnter={e=>{ if(!on){ e.currentTarget.style.background='rgba(255,255,255,0.07)'; e.currentTarget.style.color='rgba(255,255,255,0.9)'; }}}
                onMouseLeave={e=>{ if(!on){ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='rgba(255,255,255,0.6)'; }}}>
                  <span style={{ fontSize:14, width:18, textAlign:'center', flexShrink:0 }}>{item.icon}</span>
                  <span style={{ flex:1 }}>{item.label}</span>
                  {badge > 0 && (
                    <span style={{ background:'rgba(233,109,109,0.25)', border:'1px solid rgba(233,109,109,0.4)',
                      color:'#f09090', borderRadius:999, padding:'0px 6px', fontSize:10, fontWeight:800 }}>{badge}</span>
                  )}
                </button>
              );
            })}
          </nav>
          {/* Switch to player view */}
          <div style={{ borderTop:'1px solid rgba(255,255,255,0.09)', paddingTop:12, marginTop:4 }}>
            <a href="Tennisillo.html" style={{ textDecoration:'none' }}>
              <button style={{
                width:'100%', display:'flex', alignItems:'center', gap:9, padding:'9px 11px', borderRadius:11,
                border:'1px solid rgba(255,255,255,0.12)', background:'rgba(255,255,255,0.06)',
                color:'rgba(255,255,255,0.55)', cursor:'pointer', fontSize:12, fontWeight:600,
              }}>
                <span>🎾</span> <span>Vista giocatore →</span>
              </button>
            </a>
          </div>
        </div>

        {/* Main content */}
        <main style={{
          flex:1, overflowY:'auto', borderRadius:22,
          background:'linear-gradient(135deg,rgba(255,255,255,0.10),rgba(255,255,255,0.05))',
          border:'1px solid rgba(255,255,255,0.12)', backdropFilter:'blur(18px) saturate(130%)',
          boxShadow:'0 14px 40px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.15)',
          padding:'26px 30px',
        }}>
          <div style={{ maxWidth:1060, animation:'fadeUp 0.3s ease' }}>
            {renderPage()}
          </div>
        </main>
      </div>
      <Toast toasts={toasts} remove={id => setToasts(ts => ts.filter(t => t.id !== id))} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
